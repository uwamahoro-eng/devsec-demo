{% extends 'aline/base.html' %}
{% load static %}

{% block title %}Password Reset Complete | Aline UAS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm">
            <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-4" style="width: 80px; height: 80px;">
                <i class="bi bi-check-circle fs-1"></i>
            </div>
            <h2 class="fw-bold mb-3">Password Reset Complete</h2>
            <p class="text-muted mb-4">
                Your password has been successfully reset. You can now log in with your new credentials.
            </p>
            <div class="d-grid shadow-sm">
                <a href="{% url 'aline:login' %}" class="btn btn-primary btn-lg fw-semibold">
                    Log In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
