<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Obsidian Gallery — {% block title %}Home{% endblock %}</title>
<meta name="description" content="{% block meta_description %}A curation of tactile artifacts forged in shadow and light.{% endblock %}"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "secondary-fixed-dim": "#d6d4d3",
          "surface-container-lowest": "#000000",
          "error-dim": "#bb5551",
          "surface-container": "#191a1a",
          "tertiary-dim": "#efe0d5",
          "primary-container": "#763300",
          "on-surface": "#e7e5e4",
          "on-tertiary": "#685d55",
          "on-primary-fixed": "#6a2e00",
          "on-tertiary-fixed-variant": "#6d625a",
          "on-primary-fixed-variant": "#92460f",
          "secondary-dim": "#9f9d9d",
          "on-surface-variant": "#acabaa",
          "secondary-fixed": "#e4e2e1",
          "on-background": "#e7e5e4",
          "tertiary-fixed": "#feeee3",
          "on-error-container": "#ff9993",
          "primary-fixed-dim": "#ffc9ac",
          "on-secondary-fixed-variant": "#5c5b5b",
          "surface-dim": "#0e0e0e",
          "on-secondary-fixed": "#3f3f3f",
          "inverse-on-surface": "#565555",
          "surface-container-low": "#131313",
          "on-primary-container": "#ffc4a3",
          "surface-tint": "#ffb68d",
          "surface": "#0e0e0e",
          "outline-variant": "#484848",
          "error-container": "#7f2927",
          "surface-variant": "#252626",
          "surface-container-highest": "#252626",
          "background": "#0e0e0e",
          "on-primary": "#6c2e00",
          "tertiary-container": "#f8e8de",
          "on-tertiary-fixed": "#50463f",
          "primary-dim": "#ffa26b",
          "surface-bright": "#2c2c2c",
          "inverse-surface": "#fcf9f8",
          "secondary": "#9f9d9d",
          "surface-container-high": "#1f2020",
          "tertiary": "#fff8f5",
          "outline": "#767575",
          "error": "#ee7d77",
          "tertiary-fixed-dim": "#efe0d5",
          "inverse-primary": "#974913",
          "primary-fixed": "#ffdbc9",
          "on-tertiary-container": "#5f554d",
          "on-secondary": "#202020",
          "primary": "#ffb68d",
          "secondary-container": "#3b3b3b",
          "on-secondary-container": "#c1bfbe",
          "on-error": "#490106"
        },
        borderRadius: {
          "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"
        },
        fontFamily: {
          "headline": ["Newsreader", "serif"],
          "body": ["Manrope", "sans-serif"],
          "label": ["Manrope", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #0e0e0e; color: #e7e5e4; }
  .editorial-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 2rem; }
  .gallery-gradient { background: radial-gradient(circle at center, rgba(44,44,44,0.15) 0%, rgba(14,14,14,1) 100%); }
  .ember-glow { box-shadow: 0 0 60px 0 rgba(255,182,141,0.05); }
</style>
{% block extra_head %}{% endblock %}
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">

<!-- Top Navigation -->
<nav class="fixed top-0 w-full z-50 bg-[#0e0e0e]/70 backdrop-blur-2xl">
  <div class="flex justify-between items-center w-full px-8 py-6 max-w-screen-2xl mx-auto">
    <a href="/" class="text-2xl font-serif italic text-[#ffb68d]">OBSIDIAN</a>
    <div class="hidden md:flex items-center gap-12">
      <a class="{% if request.resolver_match.url_name == 'gallery' %}text-[#ffb68d] font-serif{% else %}text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d]{% endif %} transition-colors duration-500 hover:-translate-y-[2px]" href="/gallery/">Gallery</a>
      <a class="{% if request.resolver_match.url_name == 'about' %}text-[#ffb68d] font-serif{% else %}text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d]{% endif %} transition-colors duration-500 hover:-translate-y-[2px]" href="/about/">About</a>
      <a class="{% if request.resolver_match.url_name == 'contact' %}text-[#ffb68d] font-serif{% else %}text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d]{% endif %} transition-colors duration-500 hover:-translate-y-[2px]" href="/contact/">Contact</a>
    </div>
    <div class="flex items-center gap-4">
      <button id="mobile-menu-toggle" class="text-[#ffb68d] p-1 transition-transform duration-500 hover:translate-y-[2px]">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden bg-[#0e0e0e]/95 backdrop-blur-2xl px-8 py-6 flex flex-col gap-6">
    <a class="text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d] transition-colors" href="/gallery/">Gallery</a>
    <a class="text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d] transition-colors" href="/about/">About</a>
    <a class="text-[#acabaa] font-['Manrope'] uppercase tracking-widest text-[10px] hover:text-[#ffb68d] transition-colors" href="/contact/">Contact</a>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Footer -->
<footer class="bg-[#0e0e0e] w-full py-12">
  <div class="flex flex-col items-center gap-8 px-8">
    <a href="/" class="text-lg font-serif text-[#e7e5e4]">OBSIDIAN</a>
    <div class="flex gap-12">
      <a class="text-[#9f9d9d] font-['Manrope'] text-[10px] uppercase tracking-[0.2em] hover:text-[#e7e5e4] transition-colors duration-300" href="#">Instagram</a>
      <a class="text-[#9f9d9d] font-['Manrope'] text-[10px] uppercase tracking-[0.2em] hover:text-[#e7e5e4] transition-colors duration-300" href="#">Archive</a>
      <a class="text-[#9f9d9d] font-['Manrope'] text-[10px] uppercase tracking-[0.2em] hover:text-[#e7e5e4] transition-colors duration-300" href="#">Studio</a>
    </div>
    <p class="text-[#9f9d9d] font-['Manrope'] text-[10px] uppercase tracking-[0.2em] opacity-40">
      &copy; 2024 THE OBSIDIAN GALLERY. ALL RIGHTS RESERVED.
    </p>
  </div>
</footer>

<script>
  const toggle = document.getElementById('mobile-menu-toggle');
  const menu = document.getElementById('mobile-menu');
  if (toggle && menu) {
    toggle.addEventListener('click', () => menu.classList.toggle('hidden'));
  }
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
