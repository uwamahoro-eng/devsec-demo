name: Repository Checks

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  pr-submission-hygiene:
    name: Submission Hygiene
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out base repository state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate pull request body
        run: python .github/scripts/validate_pr_submission.py

  lint:
    name: Lint
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt python-dotenv ruff==0.15.10

      - name: Lint with Ruff
        run: python -m ruff check .

  django-health:
    name: Django Health
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: 'False'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt python-dotenv

      - name: Run Django system checks
        run: python manage.py check

      - name: Run Django tests
        run: python manage.py test

  submission-tooling-tests:
    name: Submission Tooling Tests
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run submission tooling tests
        run: python -m unittest discover -s tests
